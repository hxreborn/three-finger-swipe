name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Detect prerelease
        id: version
        run: |
          VERSION_NAME=${GITHUB_REF#refs/tags/v}
          if [[ "$VERSION_NAME" =~ (rc|alpha|beta) ]]; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Decode signing keystore
        run: echo "${{ secrets.RELEASE_KEYSTORE }}" | base64 -d > app/release.p12

      - name: Build libxposed
        run: ./gradlew buildLibxposed --no-daemon

      - name: Build signed APKs
        run: ./gradlew assembleDebugRelease --no-daemon --no-configuration-cache
        env:
          RELEASE_STORE_FILE: ${{ github.workspace }}/app/release.p12
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}

      - name: Generate changelog
        id: cliff
        uses: orhun/git-cliff-action@v4
        with:
          config: .github/cliff.toml
          args: --latest --strip header
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPO: ${{ github.repository }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ steps.version.outputs.prerelease }}
          files: app/build/outputs/apk/**/*.apk
          body: ${{ steps.cliff.outputs.content || format('Release {0}', github.ref_name) }}
          draft: false

      - name: Cleanup keystore
        if: always()
        run: rm -f app/release.p12

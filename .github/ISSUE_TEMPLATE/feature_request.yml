name: Feature Request
description: Suggest a new feature or improvement
labels: [ "enhancement" ]
body:
  - type: textarea
    id: description
    attributes:
      label: What do you want?
      description: Describe the feature clearly.
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use case
      description: Why do you need this? What problem does it solve?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or alternative approaches you've tried?
    validations:
      required: false
